        <section>
            <h2>Contacto</h2>
            <form>
                <p>
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" id="nombre" placeholder="Tu nombre" required minlength="2">
                </p>
                <p>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </p>
                <p>
                    <label for="mensaje">Mensaje:</label><br>
                    <textarea id="mensaje" rows="4" placeholder="Escribí tu mensaje..." required minlength="10"></textarea>
                </p>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </div>
