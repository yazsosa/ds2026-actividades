<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librería Clásica — Catálogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">📚 Librería Clásica</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- BUSCADOR -->
  <section class="py-4" style="background: white; border-bottom: 1px solid #eee;">
    <div class="container">
      <h2 class="section-title mb-3">Catálogo de libros</h2>
      <div class="d-flex gap-2">
        <input
          type="text"
          id="search-input"
          class="form-control"
          placeholder="Buscá por título, autor o categoría..."
        >
        <button class="btn-buscar btn" id="search-btn">Buscar</button>
      </div>
      <p id="results-count" class="mt-2 mb-0" style="font-size: 0.85rem; color: #999;"></p>
    </div>
  </section>

  
  <section class="py-5">
    <div class="container">
      <div class="row g-4" id="books-container"></div>
      <div id="no-results" style="display: none; text-align: center; padding: 4rem 0; color: #aaa;">
        No encontramos libros que coincidan con tu búsqueda.
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    const container = document.getElementById('books-container');
    const noResults = document.getElementById('no-results');
    const countEl = document.getElementById('results-count');
    const input = document.getElementById('search-input');
    const btn = document.getElementById('search-btn');

    function createCard(book) {
      return `
        <div class="col-sm-6 col-lg-4">
          <div class="card book-card">
            <div class="card-img-wrapper">
              <img src="${book.image}" class="card-img-top" alt="${book.title}">
            </div>
            <div class="card-body d-flex flex-column">
              <p class="card-category">${book.category}</p>
              <h5 class="card-title">${book.title}</h5>
              <p class="card-author">${book.author}</p>
              <div class="d-flex justify-content-between align-items-center mt-auto">
                <span class="card-price">$${book.price.toLocaleString('es-AR')}</span>
                <a href="libro.html?id=${book.id}" class="btn-ver-mas">Ver más</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderBooks(query = '') {
      const results = searchBooks(query);
      container.innerHTML = results.map(createCard).join('');

      if (results.length === 0) {
        noResults.style.display = 'block';
        countEl.textContent = 'No se encontraron resultados';
      } else {
        noResults.style.display = 'none';
        countEl.textContent = query
          ? `${results.length} resultado${results.length !== 1 ? 's' : ''} para "${query}"`
          : `Mostrando ${results.length} libros`;
      }
    }

    
    renderBooks();

    
    btn.addEventListener('click', () => renderBooks(input.value));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') renderBooks(input.value);
    });
    input.addEventListener('input', () => {
      if (input.value === '') renderBooks('');
    });
  </script>
</body>
</html>
