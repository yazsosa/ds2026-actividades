<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librería</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">📚 Librería</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero-section">
    <div class="container">
      <div class="row align-items-center min-vh-75">
        <div class="col-lg-7">
          <p class="hero-eyebrow">Tu próxima gran lectura te espera</p>
          <h1 class="hero-title">Descubrí el mundo<br>a través de los <em>libros</em></h1>
          <p class="hero-subtitle">
            Una selección cuidada de literatura clásica y contemporánea.
            Encontrá el libro que cambiará tu forma de ver el mundo.
          </p>
          <a href="catalogo.html" class="btn-hero">Ver catálogo completo</a>
        </div>
      </div>
    </div>
  </section>

  <!-- CARDS DESTACADOS -->
  <section class="py-5">
    <div class="container">
      <h2 class="section-title">Libros Destacados</h2>
      <div class="section-divider"></div>

      <div class="row g-4" id="featured-books-container">
        <!-- Se generan con JS -->
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    const container = document.getElementById('featured-books-container');
    const featured = getFeaturedBooks();

    featured.forEach(book => {
      const col = document.createElement('div');
      col.className = 'col-sm-6 col-lg-4';
      col.innerHTML = `
        <div class="card book-card">
          <div class="card-img-wrapper">
            <img src="${book.image}" class="card-img-top" alt="${book.title}">
          </div>
          <div class="card-body d-flex flex-column">
            <p class="card-category">${book.category}</p>
            <h5 class="card-title">${book.title}</h5>
            <p class="card-author">${book.author}</p>
            <div class="d-flex justify-content-between align-items-center mt-auto">
              <span class="card-price">$${book.price.toLocaleString('es-AR')}</span>
              <a href="libro.html?id=${book.id}" class="btn-ver-mas">Ver más</a>
            </div>
          </div>
        </div>
      `;
      container.appendChild(col);
    });
  </script>
</body>
</html>
