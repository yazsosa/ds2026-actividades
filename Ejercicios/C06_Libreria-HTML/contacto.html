<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librería Clásica — Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">📚 Librería Clásica</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- FORM -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <h2 class="section-title">Contacto</h2>
          <div class="section-divider"></div>

          <div id="form-success" class="alert mb-4" role="alert"
            style="display:none; background: #f5ebe0; border: 1px solid #7B1C3E; color: #7B1C3E; border-radius: 0;">
            ✅ ¡Mensaje enviado! Te responderemos a la brevedad.
          </div>

          <div id="contact-form">

            
            <div class="mb-4">
              <label for="nombre" class="form-label">Nombre completo *</label>
              <input type="text" class="form-control" id="nombre" placeholder="Tu nombre y apellido">
              <div class="invalid-feedback">Por favor ingresá tu nombre.</div>
            </div>

          
            <div class="mb-4">
              <label for="email" class="form-label">Correo electrónico *</label>
              <input type="email" class="form-control" id="email" placeholder="tu@email.com">
              <div class="invalid-feedback">Por favor ingresá un email válido.</div>
            </div>

            <div class="mb-4">
              <label for="asunto" class="form-label">Asunto *</label>
              <select class="form-select" id="asunto">
                <option value="" selected disabled>Seleccioná una opción...</option>
                <option value="consulta">Consulta</option>
                <option value="reclamo">Reclamo</option>
                <option value="sugerencia">Sugerencia</option>
              </select>
              <div class="invalid-feedback">Por favor seleccioná un asunto.</div>
            </div>

     
            <div class="mb-4">
              <label for="mensaje" class="form-label">Mensaje *</label>
              <textarea class="form-control" id="mensaje" rows="5"
                placeholder="Escribí tu mensaje aquí..." style="resize: vertical;"></textarea>
              <div class="invalid-feedback">Por favor escribí tu mensaje.</div>
            </div>

  
            <button type="button" class="btn-enviar btn" id="submit-btn">
              Enviar mensaje
            </button>

          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('submit-btn').addEventListener('click', function () {
      const nombre = document.getElementById('nombre');
      const email = document.getElementById('email');
      const asunto = document.getElementById('asunto');
      const mensaje = document.getElementById('mensaje');
      let valid = true;

      [nombre, email, asunto, mensaje].forEach(field => {
        if (!field.value.trim()) {
          field.classList.add('is-invalid');
          valid = false;
        } else {
          field.classList.remove('is-invalid');
        }
      });

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (email.value && !emailRegex.test(email.value)) {
        email.classList.add('is-invalid');
        valid = false;
      }

      if (valid) {
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('form-success').style.display = 'block';
      }
    });
  </script>
</body>
</html>
