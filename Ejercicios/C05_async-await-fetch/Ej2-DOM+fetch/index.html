<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio2</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .error { color: red; }
    ul { list-style: none; padding: 0; }
    li { padding: 6px 0; border-bottom: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Lista de usuarios</h1>
  <p id="cargando">Cargando...</p>
  <p id="error" class="error" style="display:none;"></p>
  <ul id="lista"></ul>

  <script>
    async function cargarUsuarios() {
      console.log("Iniciando carga...");

      const cargando = document.getElementById("cargando");
      const lista = document.getElementById("lista");
      const errorParrafo = document.getElementById("error");


      if (!cargando || !lista || !errorParrafo) {
        console.error("No se encontraron elementos del DOM");
        return;
      }

      try {
        const respuesta = await fetch("https://jsonplaceholder.typicode.com/users");

        if (!respuesta.ok) {
          throw new Error("Error en la petición");
        }

        const usuarios = await respuesta.json();
        console.log("Usuarios:", usuarios);

        cargando.style.display = "none";

        const fragment = document.createDocumentFragment();

        for (const usuario of usuarios) {
          const li = document.createElement("li");
          li.textContent = `${usuario.name} — ${usuario.email}`;
          fragment.appendChild(li);
        }

        lista.appendChild(fragment);

      } catch (error) {
        console.error("Error real:", error);

        cargando.style.display = "none";
        lista.innerHTML = "";
        errorParrafo.style.display = "block";
        errorParrafo.textContent = "Error al cargar los usuarios.";
      }
    }

    cargarUsuarios();
  </script>
</body>
</html>
